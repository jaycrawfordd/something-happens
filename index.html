  <body>
    <div class="app-shell">

        <nav class="nav" aria-label="Main navigation">

          <button class="nav-btn" data-view="calendar">

          <button class="nav-btn" data-view="log">

            <span class="nav-label">Log Today</span>

          <button class="nav-btn" data-view="goals">
            <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1"/></svg>

          <button class="nav-btn" data-view="weight">
            <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="4" width="18" height="17" rx="3"/><path d="M8 10a4 4 0 0 1 8 0M12 10l2-2"/></svg>

          <button class="nav-btn" data-view="settings">

        </nav>
        <div class="sidebar-signature">
          <span class="signature-avatar"><img src="assets/cute.jpg" alt=""></span>
          <span class="signature-name">something happens</span>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <h2 id="viewTitle">Dashboard</h2>
        </header>

        <section id="dashboard" class="view is-active"></section>
        <section id="calendar" class="view"></section>
        <section id="log" class="view"></section>
        <section id="goals" class="view"></section>
        <section id="weight" class="view"></section>
        <section id="settings" class="view"></section>
      </main>
    </div>

    <dialog id="goalDialog">
      <form method="dialog" id="goalForm" class="dialog-form">
        <div class="dialog-head">
          <h3 id="goalDialogTitle">New Goal</h3>
          <button type="button" class="icon-btn" id="closeGoalDialog" aria-label="Close">×</button>
        </div>
        <input type="hidden" id="goalId">
        <div class="form-grid">
          <label>Goal name<input id="goalName" required></label>
          <label>Priority<select id="goalPriority">
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
          </select></label>
        </div>
        <label>Why it matters<textarea id="goalWhy" rows="2"></textarea></label>
        <label>Actions <span class="hint">One clear action per line.</span><textarea id="goalActions" rows="5"></textarea></label>
        <label class="goal-track-toggle"><input type="checkbox" id="goalTrackDaily"><span>Track these actions in the daily log</span></label>
        <label>Websites and resources <span class="hint">One URL per line.</span><textarea id="goalResources" rows="4" placeholder="https://example.com"></textarea></label>
        <div class="dialog-actions">
          <button class="primary-btn" value="default">Save Goal</button>
        </div>
      </form>
    </dialog>

    <script src="app.js?v=20260628-2"></script>
  </body>
</html>
